<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Economía en Conexión - Planificador</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#edf3ff;
padding:40px;
}

h1{
text-align:center;
color:#0a3d91;
}

.panel{
display:flex;
gap:30px;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:320px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#1f6fff;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#174dcc;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th{
background:#1f6fff;
color:white;
}

td,th{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

.result{
text-align:center;
margin-top:30px;
font-size:22px;
}

.green{
color:green;
font-weight:bold;
}

.red{
color:red;
font-weight:bold;
}

canvas{
max-width:700px;
margin:auto;
margin-top:40px;
display:block;
}

</style>

</head>

<body>

<h1>📊 Economía en Conexión - Planificador del Evento</h1>

<div class="panel">

<div class="card">

<h3>Entradas</h3>

<label>Precio VIP</label>
<input id="vipPrecio">

<label>Ventas VIP</label>
<input id="vipVentas">

<label>Precio General</label>
<input id="genPrecio">

<label>Ventas General</label>
<input id="genVentas">

<label>Precio Early Bird</label>
<input id="earlyPrecio">

<label>Ventas Early Bird</label>
<input id="earlyVentas">

<button onclick="calcular()">Actualizar ingresos</button>

</div>

<div class="card">

<h3>Agregar gasto</h3>

<input id="gastoNombre" placeholder="Concepto">

<input id="gastoValor" placeholder="Costo">

<button onclick="agregarGasto()">Agregar</button>

</div>

</div>

<h2>Gastos</h2>

<table>

<thead>

<tr>
<th>Concepto</th>
<th>Costo</th>
<th>Editar</th>
<th>Borrar</th>
</tr>

</thead>

<tbody id="tablaGastos">

</tbody>

</table>

<div class="result">

<p>Ingresos: <span id="ingresos">$0</span></p>

<p>Gastos totales: <span id="gastos">$0</span></p>

<p>Resultado: <span id="resultado">$0</span></p>

</div>

<canvas id="grafico"></canvas>

<script>

let gastos = JSON.parse(localStorage.getItem("gastos")) || []

let chart

function guardar(){

localStorage.setItem("gastos",JSON.stringify(gastos))

}

function agregarGasto(){

let nombre=document.getElementById("gastoNombre").value
let valor=parseFloat(document.getElementById("gastoValor").value)

if(!nombre || !valor){
alert("Completar datos")
return
}

gastos.push({nombre,valor})

guardar()

dibujarTabla()

calcular()

}

function dibujarTabla(){

let tabla=document.getElementById("tablaGastos")

tabla.innerHTML=""

gastos.forEach((g,index)=>{

tabla.innerHTML+=`

<tr>

<td>${g.nombre}</td>

<td>$${g.valor}</td>

<td><button onclick="editar(${index})">Editar</button></td>

<td><button onclick="borrar(${index})">Borrar</button></td>

</tr>

`

})

}

function editar(i){

let nuevoNombre=prompt("Nuevo nombre",gastos[i].nombre)

let nuevoValor=prompt("Nuevo valor",gastos[i].valor)

gastos[i].nombre=nuevoNombre

gastos[i].valor=parseFloat(nuevoValor)

guardar()

dibujarTabla()

calcular()

}

function borrar(i){

gastos.splice(i,1)

guardar()

dibujarTabla()

calcular()

}

function calcular(){

let vip=(+vipPrecio.value||0)*(+vipVentas.value||0)

let gen=(+genPrecio.value||0)*(+genVentas.value||0)

let early=(+earlyPrecio.value||0)*(+earlyVentas.value||0)

let ingresos=vip+gen+early

let gastoTotal=gastos.reduce((a,b)=>a+b.valor,0)

let resultado=ingresos-gastoTotal

ingresosSpan.textContent="$"+ingresos

gastosSpan.textContent="$"+gastoTotal

resultadoSpan.textContent="$"+resultado

resultadoSpan.className=resultado>=0?"green":"red"

grafico(ingresos,gastoTotal)

}

function grafico(ingresos,gastos){

let ctx=document.getElementById("grafico")

if(chart) chart.destroy()

chart=new Chart(ctx,{

type:"doughnut",

data:{

labels:["Ingresos","Gastos"],

datasets:[{

data:[ingresos,gastos]

}]

}

})

}

dibujarTabla()

</script>

</body>

</html>
